name: Build MASAR APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Build TWA
        run: |
          bubblewrap init --manifest=https://mthnaapk.netlify.app/manifest.json --directory=twa
          cd twa && bubblewrap build
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: masar-apk
          path: twa/app-release-signed.apk
