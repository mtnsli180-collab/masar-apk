name: Build MASAR APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.muthanna.masar",
            "host": "mthnaapk.netlify.app",
            "name": "MASAR",
            "launcherName": "MASAR",
            "display": "standalone",
            "themeColor": "#1a1a2e",
            "navigationColor": "#1a1a2e",
            "backgroundColor": "#1a1a2e",
            "startUrl": "/",
            "iconUrl": "https://mthnaapk.netlify.app/icon-512.png",
            "maskableIconUrl": "https://mthnaapk.netlify.app/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://mthnaapk.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableNotifications": false,
            "shortcuts": [],
            "monochromeIconUrl": "",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://mthnaapk.netlify.app/",
            "minSdkVersion": 19,
            "orientation": "default"
          }
          EOF

      - name: Build APK
        run: |
          mkdir twa && cp twa-manifest.json twa/twa-manifest.json
          cd twa
          bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: masar-apk
          path: twa/*.apk
