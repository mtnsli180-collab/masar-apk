name: Build MASAR APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone TWA Template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa
          cd twa
          sed -i 's|https://svgomg.firebaseapp.com|https://mthnaapk.netlify.app|g' app/build.gradle
          sed -i 's|com.chromeos.svgomg|com.muthanna.masar|g' app/build.gradle
          grep -rl "SVGOMG" . | xargs sed -i 's|SVGOMG|MASAR|g' || true

      - name: Build Debug APK
        run: |
          cd twa
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: masar-apk
          path: twa/app/build/outputs/apk/debug/*.apk
